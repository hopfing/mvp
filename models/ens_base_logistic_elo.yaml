data:
  date_range:
    start: 2020-01-01
    end: 2025-12-31
  filters:
    draw_type: singles
    circuit: [tour, chal]

features:
  include:
    - elo_surface_diff
    - svc_elo_diff
    - ret_elo_diff
    - age_diff
model:
  type: logistic
validation:
  type: expanding_window
  initial_train_size: 30000
  step_size: 15000
