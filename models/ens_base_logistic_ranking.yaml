data:
  date_range:
    start: 2020-01-01
    end: 2025-12-31
  filters:
    draw_type: singles
    circuit: [tour, chal]

features:
  include:
    - ranking_rank_diff
    - h2h_win_pct
    - surface_win_pct_diff
    - venue_win_pct_diff
model:
  type: logistic
validation:
  type: expanding_window
  initial_train_size: 30000
  step_size: 15000
