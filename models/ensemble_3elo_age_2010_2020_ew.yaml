data:
  date_range:
    start: 2020-01-01
    end: 2025-12-31
  filters:
    draw_type: singles
    circuit: [tour, chal]

model:
  type: ensemble
  params:
    strategy: average
    base_models:
      - config: models/cmp_3elo_age_2010_ew.yaml
      - config: models/cmp_3elo_age_2020_ew.yaml
validation:
  type: expanding_window
  initial_train_size: 30000
  step_size: 15000
