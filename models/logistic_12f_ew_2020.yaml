data:
  date_range:
    start: 2020-01-01
    end: 2025-12-31
  filters:
    draw_type: singles
    circuit: [tour, chal]

features:
  include:
    - player_elo_surface_diff
    - player_svc_elo_matchup
    - player_ret_elo_matchup
    - player_age_diff
    - player_tour_match_pct_diff
    - player_venue_win_pct_diff
    - player_elo_surface_consistency
    - opp_elo_surface_consistency
    - player_avg_opp_ranking(days=90)
    - opp_avg_opp_ranking(days=90)
    - player_match_count_diff(days=30)
    - player_deciding_set_win_pct_diff(days=30)
model:
  type: logistic

validation:
  type: expanding_window
  initial_train_size: 30000
  step_size: 15000
