data:
  date_range:
    end: 2025-12-31
    start: 2020-01-01
  filters:
    circuit: chal
    draw_type: singles
description: null
features:
  include:
  - player_elo_surface_diff
  - player_svc_elo_diff
  - elo_diff_x_elo_avg
  - player_ret_elo_diff
  - player_age_diff
  - player_match_count_diff(days=30)
  - player_tour_match_pct_diff
  - player_venue_win_pct_diff
  - player_svc_ace_pct_diff(days=15)
  - player_win_pct_diff(days=180)
  - player_svc_df_pct_diff(days=180)
  - player_elo_clutch_diff
  - player_pts_service_won_pct_diff(days=30)
  - player_deciding_set_win_pct_diff(days=30)
  - player_ranking_rank_diff
metrics:
  primary: log_loss
model:
  params: null
  type: logistic
validation:
  initial_train_size: 20000
  step_size: 10000
  type: expanding_window
