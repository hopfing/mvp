calibration:
  method: isotonic
data:
  date_range:
    end: 2025-12-31
    start: 2020-01-01
  filters:
    circuit:
    - tour
    - chal
    draw_type: singles
features:
  include:
  - player_glicko_mu_over_sigma
  - opp_glicko_mu_over_sigma
  - player_elo_surface_diff
  - player_glicko_rd_diff
  - player_age_diff
  - player_opp_elo_faced_avg_diff
  - player_surface_win_pct_diff
