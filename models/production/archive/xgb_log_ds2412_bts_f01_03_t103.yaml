    max_bin: 256
    max_delta_step: 5
    max_depth: 6
    max_leaves: 0
    min_child_weight: 6
    n_estimators: 700
    n_jobs: 8
    random_state: 42
    reg_alpha: 0.09722997985102008
    reg_lambda: 1.0713866737579933
    scale_pos_weight: 0.9939914749522132
    subsample: 0.5191137586847817
    tree_method: exact
  type: xgboost
