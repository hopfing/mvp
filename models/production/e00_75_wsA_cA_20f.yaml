data:
  date_range:
    end: 2025-12-31
    start: 2020-01-01
  filters:
    circuit:
    - tour
    - chal
    draw_type: singles
description: null
features:
  include:
  - player_elo_surface_diff
  - player_glicko_rd_diff
  - player_match_count_diff(days=365)
  - player_age_diff
  - player_tour_match_pct_diff
  - player_venue_win_pct_diff
  - player_elo_tb_clutch_diff
  - player_pts_service_won_pct_diff(days=15)
  - player_deciding_set_win_pct_diff(days=90)
  - player_match_count_diff(days=60)
  - player_style_winner_rate_diff(days=30)
  - player_pts_total_won_pct_diff(days=365)
  - player_svc_ace_pct_diff(days=15)
  - player_svc_bp_save_pct_diff(days=15)
  - player_svc_ace_pct_diff
  - player_deciding_set_win_pct_diff(days=30)
  - player_win_pct_diff(days=365)
  - player_glicko_diff_x_rd_sum
  - player_ret_ace_resistance_diff
  - player_svc_second_serve_reliability_diff
metrics:
  primary: log_loss
model:
  params: null
  type: logistic
validation:
  initial_train_size: 20000
  step_size: 10000
  type: expanding_window
