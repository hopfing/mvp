data:
  date_range:
    start: 2020-01-01
    end: 2025-12-31
  filters:
    draw_type: singles
    circuit: [tour, chal]
    player_elo_surface_diff: {min: -75, max: 75}

features:
  include:
    - player_elo_surface_diff
    - player_svc_elo_matchup
    - player_ret_elo_matchup
    - player_elo_clutch_diff
    - player_svc_clutch_matchup
    - player_ret_clutch_matchup
    - player_h2h_wins_diff
    - player_deciding_set_win_pct_diff
    - player_tiebreak_win_pct_diff
    - player_win_pct_diff
    - player_venue_win_pct_diff
    - player_avg_opp_ranking(days=90)
    - opp_avg_opp_ranking(days=90)

model:
  type: logistic

validation:
  type: expanding_window
  initial_train_size: 15000
  step_size: 10000
