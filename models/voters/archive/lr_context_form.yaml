data:
  date_range:
    end: 2025-12-31
    start: 2020-01-01
  filters:
    circuit:
    - tour
    - chal
    draw_type: singles
description: null
features:
  include:
  - player_deciding_set_win_pct_diff(days=180)
  - player_tourn_sets_lost_diff
  - player_pts_service_won_pct_diff(days=15)
  - player_deciding_set_win_pct_diff(days=15)
  - player_match_count_diff(days=365)
  - player_days_since_surface_diff
  - player_venue_win_pct_diff
  - player_straight_sets_win_pct_diff
  - player_sets_per_match_diff(days=15)
metrics:
  primary: log_loss
model:
  params: null
  type: logistic
validation:
  initial_train_size: 20000
  step_size: 10000
  type: expanding_window
