data:
  date_range:
    end: 2025-12-31
    start: 2020-01-01
  filters:
    circuit:
    - tour
    - chal
    draw_type: singles
    player_elo_surface_diff:
      abs_max: 75
description: close match specialist
features:
  include:
  - player_elo_surface_diff
  - player_tour_match_pct_diff(days=365)
  - player_svc_elo_diff
  - player_ret_elo_diff
  - player_age_diff
  - player_match_count_diff(days=30)
  - player_venue_win_pct_diff
  - player_tour_match_pct_diff
  - player_svc_ace_pct_diff(days=15)
  - player_elo_clutch_diff
metrics:
  primary: log_loss
model:
  params: null
  type: logistic
validation:
  initial_train_size: 20000
  step_size: 10000
  type: expanding_window
