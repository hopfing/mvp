data:
  date_range:
    end: 2025-12-31
    start: 2020-01-01
  filters:
    circuit:
    - tour
    - chal
    draw_type: singles
    player_ranking_rank_diff: {abs_max: 34}
description: null
features:
  include:
  - elo_diff_x_elo_avg
  - player_pts_service_won_pct_diff(days=15)
  - player_ret_rating_diff
  - player_tour_match_pct_diff(days=180)
  - player_venue_win_pct_diff
  - player_style_avg_1st_serve_speed_diff(days=30)
  - player_circuit_win_pct_diff(days=15)
  - player_age_diff
  - player_tour_match_pct_diff
  - player_pts_return_won_pct_diff(days=15)
  - player_elo_diff
  - player_pts_total_won_pct_diff(days=365)
  - player_deciding_set_win_pct_diff(days=365)
  - player_height_diff
  - player_surface_win_pct_diff(days=180)
metrics:
  primary: brier_score
model:
  type: logistic
validation:
  type: expanding_window
  initial_train_size: 20000
  step_size: 10000
