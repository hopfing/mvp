data:
  date_range:
    end: 2025-12-31
    start: 2020-01-01
  filters:
    circuit:
    - tour
    - chal
    draw_type: singles
description: null
features:
  include:
  - player_glicko_diff_x_rd_sum
  - player_elo_tb_clutch_diff
  - player_age_diff
  - player_glicko_rd_diff
  - player_elo_surface_diff
  - player_opp_elo_beaten_avg_diff(days=30)
metrics:
  primary: log_loss
model:
  params: null
  type: logistic
validation:
  initial_train_size: 20000
  step_size: 10000
  type: expanding_window
