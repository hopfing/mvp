data:
  date_range:
    end: 2025-12-31
    start: 2020-01-01
  filters:
    circuit:
    - tour
    - chal
    draw_type: singles
description: null
features:
  include:
  - player_tourn_sets_margin
  - opp_tourn_sets_margin
  - player_glicko_diff_x_rd_sum
  - player_days_since_last_match
  - opp_days_since_last_match
  - opp_deciding_set_pct
  - player_deciding_set_pct
metrics:
  primary: log_loss
model:
  params:
    colsample_bytree: 0.8
    learning_rate: 0.1
    max_depth: 4
    min_child_weight: 5
    n_estimators: 100
    random_state: 42
    subsample: 0.8
  type: xgboost
validation:
  initial_train_size: 20000
  step_size: 10000
  type: expanding_window
